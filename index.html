<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Exam</title>

<style>
body{
  font-family:Segoe UI;
  background:#f1f5f9;
  margin:0;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:#1e3a8a;
  color:#fff;
}

.timer{
  font-weight:bold;
}

/* LAYOUT */
.container{
  display:flex;
}

.sidebar{
  width:220px;
  background:#0f172a;
  color:#fff;
  height:100vh;
  overflow:auto;
  padding:10px;
}

.qnav button{
  width:45px;
  height:45px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.answered{background:#22c55e;color:#fff;}
.current{background:#2563eb;color:#fff;}

.main{
  flex:1;
  padding:20px;
}

/* QUESTION */
.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
}

.option{
  display:block;
  padding:12px;
  border:1px solid #ddd;
  margin-top:10px;
  border-radius:6px;
  cursor:pointer;
}

.option:hover{
  background:#f1f5f9;
}

.btn{
  padding:10px 16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:15px;
}

.next{background:#2563eb;color:#fff;}
.submit{background:#22c55e;color:#fff;}
</style>
</head>

<body>

<div class="topbar">
  <h3>CBT Examination</h3>
  <div class="timer" id="timer">20:00</div>
</div>

<div class="container">

  <!-- QUESTION NAV -->
  <div class="sidebar">
    <h4>Questions</h4>
    <div class="qnav" id="qnav"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="card">
      <h3 id="qNumber"></h3>
      <p id="questionText"></p>

      <div id="options"></div>

      <button class="btn next" onclick="nextQuestion()">Next</button>
      <button class="btn submit" onclick="submitExam()">Submit</button>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
